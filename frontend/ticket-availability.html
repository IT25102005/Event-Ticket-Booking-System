<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Ticket Availability</title>
    <link rel="stylesheet" href="css/ticket-pricing-management.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .avail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin: 1.5rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 10px var(--neon-cyan);
            width: 0%;
            transition: 1s ease-in-out;
        }
    </style>
</head>
<body onload="loadAvailability()">
    
    <div class="sidebar">
        <span class="logo">ANTIGRAVITY</span>
        <ul class="nav-links">
            <li><a href="ticket-dashboard.html"><span>Dashboard</span></a></li>
            <li><a href="add-ticket.html"><span>Add Ticket</span></a></li>
            <li><a href="price-calculator.html"><span>Price Calculator</span></a></li>
            <li><a href="ticket-availability.html" class="active"><span>Availability</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <h1>Ticket Availability Tracker</h1>
            <div class="form-group" style="margin: 0;">
                <input type="number" id="event-id-filter" class="form-control" placeholder="Enter Event ID to filter..." oninput="loadAvailability()">
            </div>
        </header>

        <div id="availability-list" class="avail-grid">
            <!-- Availability cards will be loaded here -->
        </div>
    </div>

    <script src="js/ticket-pricing-management.js"></script>
    <script>
        async function loadAvailability() {
            const eventId = document.getElementById('event-id-filter').value;
            let endpoint = '/tickets';
            if (eventId) endpoint = `/tickets/event/${eventId}`;
            
            const tickets = await fetchData(endpoint);
            const list = document.getElementById('availability-list');
            list.innerHTML = tickets.map(ticket => {
                const percentage = (ticket.soldQuantity / ticket.totalQuantity) * 100;
                return `
                    <div class="card">
                        <h3>${ticket.ticketName}</h3>
                        <p style="font-size: 1rem; color: var(--text-secondary);">${ticket.ticketCategory}</p>
                        
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${percentage}%"></div>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                            <span>Sold: ${ticket.soldQuantity}</span>
                            <span>Available: ${ticket.availableQuantity}</span>
                        </div>
                        
                        <div style="margin-top: 1.5rem; text-align: center;">
                            <span class="badge ${ticket.status.toLowerCase()}-badge">${ticket.status}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
