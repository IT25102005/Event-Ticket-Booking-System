<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Price Calculator</title>
    <link rel="stylesheet" href="css/ticket-pricing-management.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .calc-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .result-display {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: var(--accent-glow);
        }
        .result-item {
            margin-bottom: 2rem;
            text-align: center;
        }
        .result-item h4 {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .result-item p {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--neon-cyan);
        }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <span class="logo">ANTIGRAVITY</span>
        <ul class="nav-links">
            <li><a href="ticket-dashboard.html"><span>Dashboard</span></a></li>
            <li><a href="add-ticket.html"><span>Add Ticket</span></a></li>
            <li><a href="price-calculator.html" class="active"><span>Price Calculator</span></a></li>
            <li><a href="ticket-availability.html"><span>Availability</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <h1>Advanced Pricing Calculator</h1>
        </header>

        <div class="calc-container">
            <div class="form-container">
                <div class="form-group">
                    <label>Category</label>
                    <select id="calc-category" class="form-control calc-input">
                        <option value="STANDARD">Standard</option>
                        <option value="VIP">VIP</option>
                        <option value="EARLY_BIRD">Early Bird</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Base Price ($)</label>
                    <input type="number" id="calc-base-price" class="form-control calc-input" value="100">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="calc-discount" class="form-control calc-input" value="0">
                </div>
                <div class="form-group">
                    <label>Tax (%)</label>
                    <input type="number" id="calc-tax" class="form-control calc-input" value="5">
                </div>
                <div class="form-group">
                    <label>Service Fee ($)</label>
                    <input type="number" id="calc-service-fee" class="form-control calc-input" value="10">
                </div>
                <div class="form-group">
                    <label>Extra/VIP Fee ($)</label>
                    <input type="number" id="calc-extra-fee" class="form-control calc-input" value="0">
                </div>
            </div>

            <div class="result-display">
                <div class="result-item">
                    <h4>Discount Amount</h4>
                    <p id="res-discount">$0.00</p>
                </div>
                <div class="result-item">
                    <h4>Tax Amount</h4>
                    <p id="res-tax">$5.00</p>
                </div>
                <div class="result-item">
                    <h4>Final Price</h4>
                    <p id="res-final" style="font-size: 4rem;">$115.00</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/price-calculator.js"></script>
</body>
</html>
