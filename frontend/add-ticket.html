<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Add Ticket</title>
    <link rel="stylesheet" href="css/ticket-pricing-management.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .form-container {
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
            margin: 0 auto;
        }
        .conditional-fields {
            display: none;
            padding: 1.5rem;
            border-left: 2px solid var(--neon-cyan);
            background: rgba(0, 240, 255, 0.02);
            margin-top: 1rem;
            border-radius: 0 15px 15px 0;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <span class="logo">ANTIGRAVITY</span>
        <ul class="nav-links">
            <li><a href="ticket-dashboard.html"><span>Dashboard</span></a></li>
            <li><a href="add-ticket.html" class="active"><span>Add Ticket</span></a></li>
            <li><a href="price-calculator.html"><span>Price Calculator</span></a></li>
            <li><a href="ticket-availability.html"><span>Availability</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <h1>Create New Ticket</h1>
            <button class="btn" onclick="window.location.href='ticket-dashboard.html'">Back</button>
        </header>

        <div class="form-container">
            <form onsubmit="submitTicketForm(event)">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Event ID</label>
                        <input type="number" name="eventId" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Ticket Name</label>
                        <input type="text" name="ticketName" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Ticket Category</label>
                        <select name="ticketCategory" id="ticketCategory" class="form-control" onchange="handleTicketTypeChange()" required>
                            <option value="STANDARD">Standard</option>
                            <option value="VIP">VIP</option>
                            <option value="EARLY_BIRD">Early Bird</option>
                            <option value="STUDENT">Student</option>
                            <option value="GROUP">Group</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Base Price ($)</label>
                        <input type="number" step="0.01" name="basePrice" class="form-control" required>
                    </div>
                </div>

                <!-- Conditional Fields for VIP -->
                <div id="vip-fields" class="conditional-fields">
                    <h3>VIP Details</h3>
                    <div class="form-group">
                        <label>VIP Benefits</label>
                        <input type="text" name="vipBenefits" class="form-control">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>VIP Service Fee ($)</label>
                            <input type="number" step="0.01" name="vipServiceFee" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Lounge Access</label>
                            <select name="loungeAccess" class="form-control">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Conditional Fields for Standard -->
                <div id="standard-fields" class="conditional-fields">
                    <h3>Standard Details</h3>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Standard Service Fee ($)</label>
                            <input type="number" step="0.01" name="standardServiceFee" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Seat Preference</label>
                            <select name="seatPreferenceAllowed" class="form-control">
                                <option value="true">Allowed</option>
                                <option value="false">Not Allowed</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Conditional Fields for Early Bird -->
                <div id="earlybird-fields" class="conditional-fields">
                    <h3>Early Bird Details</h3>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Extra Discount (%)</label>
                            <input type="number" step="0.1" name="earlyBirdDiscountPercentage" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Offer End Date</label>
                            <input type="datetime-local" name="offerEndDate" class="form-control">
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Discount (%)</label>
                        <input type="number" step="0.1" name="discountPercentage" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Tax (%)</label>
                        <input type="number" step="0.1" name="taxPercentage" class="form-control">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Total Quantity</label>
                        <input type="number" name="totalQuantity" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Max Purchase Limit</label>
                        <input type="number" name="maxPurchaseLimit" class="form-control">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Sale Start Date</label>
                        <input type="datetime-local" name="saleStartDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Sale End Date</label>
                        <input type="datetime-local" name="saleEndDate" class="form-control" required>
                    </div>
                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Create Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/ticket-pricing-management.js"></script>
</body>
</html>
