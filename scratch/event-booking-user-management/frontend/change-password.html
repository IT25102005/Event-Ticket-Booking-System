<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - EventBooker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/user-management.css">
    <style>
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--glass-bg);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glow-shadow);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
        }
        .form-group input:focus { border-color: var(--neon-cyan); }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, var(--deep-purple), var(--neon-cyan));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo-container">EventBooker</div>
        <ul class="nav-links">
            <li><a href="user-dashboard.html">Dashboard</a></li>
            <li><a href="profile.html">My Profile</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="form-container">
            <h2>Change Password</h2>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" required minlength="6">
                </div>
                <button type="submit" class="btn-submit">Update Password</button>
                <div id="messageBox" style="margin-top: 1rem; text-align: center;"></div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userStr);

            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const messageBox = document.getElementById('messageBox');
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    messageBox.innerHTML = '<span style="color: #FF4081;">New passwords do not match.</span>';
                    return;
                }

                try {
                    const response = await fetch(`http://localhost:8080/api/users/${user.userId}/change-password`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ currentPassword, newPassword })
                    });

                    if (response.ok) {
                        messageBox.innerHTML = '<span style="color: #00FF80;">Password updated successfully!</span>';
                        document.getElementById('passwordForm').reset();
                    } else {
                        messageBox.innerHTML = '<span style="color: #FF4081;">Failed to update password. Check current password.</span>';
                    }
                } catch (error) {
                    messageBox.innerHTML = '<span style="color: #FF4081;">Connection error.</span>';
                }
            });
        });
    </script>
</body>
</html>
