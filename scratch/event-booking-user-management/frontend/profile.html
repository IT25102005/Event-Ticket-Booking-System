<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - EventBooker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/user-management.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--deep-purple), var(--neon-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            box-shadow: var(--glow-shadow);
        }
        .profile-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            background: var(--glass-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glow-shadow);
        }
        .detail-item label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        .detail-item span {
            font-size: 1.1rem;
            font-weight: 500;
        }
        .profile-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
        }
        .btn-primary {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(45deg, var(--deep-purple), var(--neon-cyan));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-outline {
            padding: 0.8rem 1.5rem;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            color: var(--neon-cyan);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo-container">EventBooker</div>
        <ul class="nav-links">
            <li><a href="user-dashboard.html">Dashboard</a></li>
            <li><a href="profile.html" class="active">My Profile</a></li>
            <li><a href="login.html" id="logoutBtn">Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profileAvatar">U</div>
                <div>
                    <h1 id="profileName">Loading...</h1>
                    <p id="profileRoleDesc" style="color: var(--text-secondary); margin-top: 0.5rem;"></p>
                    <div style="margin-top: 0.5rem;">
                        <span class="badge" id="roleBadge">ROLE</span>
                        <span class="badge" id="statusBadge">STATUS</span>
                    </div>
                </div>
            </div>

            <div class="profile-details-grid">
                <div class="detail-item">
                    <label>Username</label>
                    <span id="pUsername">-</span>
                </div>
                <div class="detail-item">
                    <label>Email</label>
                    <span id="pEmail">-</span>
                </div>
                <div class="detail-item">
                    <label>Phone Number</label>
                    <span id="pPhone">-</span>
                </div>
                <div class="detail-item">
                    <label>Address</label>
                    <span id="pAddress">-</span>
                </div>
                <div class="detail-item">
                    <label>Member Since</label>
                    <span id="pDate">-</span>
                </div>
            </div>

            <div class="profile-actions">
                <a href="edit-profile.html" class="btn-primary">Edit Profile</a>
                <a href="change-password.html" class="btn-outline">Change Password</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);
            
            document.getElementById('profileName').innerText = `${user.firstName} ${user.lastName}`;
            document.getElementById('profileAvatar').innerText = `${user.firstName.charAt(0)}${user.lastName.charAt(0)}`.toUpperCase();
            document.getElementById('profileRoleDesc').innerText = user.roleDescription || 'User';
            
            const roleBadge = document.getElementById('roleBadge');
            roleBadge.innerText = user.role;
            roleBadge.className = `badge role-${user.role.toLowerCase()}`;

            const statusBadge = document.getElementById('statusBadge');
            statusBadge.innerText = user.status;
            statusBadge.className = `badge status-${user.status.toLowerCase()}`;

            document.getElementById('pUsername').innerText = user.username;
            document.getElementById('pEmail').innerText = user.email;
            document.getElementById('pPhone').innerText = user.phoneNumber || 'Not provided';
            document.getElementById('pAddress').innerText = user.address || 'Not provided';
            
            if(user.createdAt) {
                const date = new Date(user.createdAt);
                document.getElementById('pDate').innerText = date.toLocaleDateString();
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('user');
            });
        });
    </script>
</body>
</html>
