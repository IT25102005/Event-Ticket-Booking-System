spring.application.name=backend

# =====================================================
# MySQL Database Configuration
# Make sure MySQL is running and the database exists.
# Run this SQL first: CREATE DATABASE event_ticket_booking;
# Change the password below to your MySQL root password.
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/event_ticket_booking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / Hibernate Configuration
# ddl-auto=update → Hibernate will auto-create/update tables
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================================
# Server Configuration
# =====================================================
server.port=8080
