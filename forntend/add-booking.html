<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Booking | Booking Management</title>
    <link rel="stylesheet" href="css/booking-management.css">
</head>
<body>

<div class="layout">
    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🎟️</div>
            <div>
                <h2>BookingHub</h2>
                <span>Booking Management</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <a href="booking-dashboard.html" class="nav-item" data-page="booking-dashboard.html">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="add-booking.html" class="nav-item active" data-page="add-booking.html">
                <span class="icon">➕</span> Add Booking
            </a>
        </nav>
        <div class="sidebar-footer">SE1020 OOP Group Project</div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="main-content">
        <header class="top-header">
            <div class="page-title">
                <h1>Add New Booking</h1>
                <p>Create an online or counter booking</p>
            </div>
        </header>

        <div class="page-body">
            <div class="back-btn" onclick="navigateTo('booking-dashboard.html')">
                ← Back to Dashboard
            </div>

            <div class="form-card">
                <h2>🎟️ Booking Details</h2>

                <!-- Booking Type Selector -->
                <div class="form-group">
                    <label>Booking Type *</label>
                    <select id="booking-type" onchange="toggleTypeFields()">
                        <option value="ONLINE">🌐 Online Booking</option>
                        <option value="COUNTER">🏢 Counter Booking</option>
                    </select>
                </div>

                <!-- Common Fields -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="customerName" placeholder="e.g. John Perera">
                    </div>
                    <div class="form-group">
                        <label>Event Code *</label>
                        <input type="text" id="eventCode" placeholder="e.g. EVT-001">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Number of Tickets *</label>
                        <input type="number" id="numberOfTickets" min="1" placeholder="e.g. 2" oninput="updateTotal()">
                    </div>
                    <div class="form-group">
                        <label>Ticket Price (Rs.) *</label>
                        <input type="number" id="ticketPrice" min="0" step="0.01" placeholder="e.g. 1500.00" oninput="updateTotal()">
                    </div>
                </div>

                <!-- Total Amount Preview -->
                <div class="total-box" id="total-box">
                    <span>Estimated Total Amount</span>
                    <strong id="total-display">Rs. 0.00</strong>
                </div>

                <!-- Online Booking Fields -->
                <div class="conditional-fields visible" id="online-fields">
                    <h4>🌐 Online Booking Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Payment Gateway</label>
                            <select id="paymentGateway">
                                <option value="PayHere">PayHere</option>
                                <option value="Stripe">Stripe</option>
                                <option value="PayPal">PayPal</option>
                                <option value="Dialog Genie">Dialog Genie</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Convenience Fee (Rs.)</label>
                            <input type="number" id="convenienceFee" min="0" step="0.01" placeholder="e.g. 150.00" oninput="updateTotal()">
                        </div>
                    </div>
                </div>

                <!-- Counter Booking Fields -->
                <div class="conditional-fields" id="counter-fields">
                    <h4>🏢 Counter Booking Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Counter Number</label>
                            <input type="number" id="counterNumber" min="1" placeholder="e.g. 3">
                        </div>
                        <div class="form-group">
                            <label>Handling Agent</label>
                            <input type="text" id="handlingAgent" placeholder="e.g. Kasun Silva">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div style="display:flex; gap:12px; margin-top:8px;">
                    <button class="btn btn-primary" onclick="handleSubmit()">✅ Create Booking</button>
                    <button class="btn btn-outline" onclick="navigateTo('booking-dashboard.html')">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/booking-management.js"></script>
<script>
    function toggleTypeFields() {
        const type = document.getElementById('booking-type').value;
        document.getElementById('online-fields').classList.toggle('visible', type === 'ONLINE');
        document.getElementById('counter-fields').classList.toggle('visible', type === 'COUNTER');
        updateTotal();
    }

    function updateTotal() {
        const tickets = parseFloat(document.getElementById('numberOfTickets').value) || 0;
        const price   = parseFloat(document.getElementById('ticketPrice').value) || 0;
        const type    = document.getElementById('booking-type').value;
        let total = tickets * price;
        if (type === 'ONLINE') {
            const fee = parseFloat(document.getElementById('convenienceFee').value) || 0;
            total += fee;
        }
        document.getElementById('total-display').textContent = `Rs. ${total.toFixed(2)}`;
    }

    async function handleSubmit() {
        const type           = document.getElementById('booking-type').value;
        const customerName   = document.getElementById('customerName').value.trim();
        const eventCode      = document.getElementById('eventCode').value.trim();
        const numberOfTickets = parseInt(document.getElementById('numberOfTickets').value);
        const ticketPrice    = parseFloat(document.getElementById('ticketPrice').value);

        // Validation
        if (!customerName) { showToast('Customer name is required.', 'error'); return; }
        if (!eventCode)    { showToast('Event code is required.', 'error'); return; }
        if (!numberOfTickets || numberOfTickets < 1) { showToast('Number of tickets must be at least 1.', 'error'); return; }
        if (!ticketPrice || ticketPrice < 0) { showToast('Ticket price is required.', 'error'); return; }

        let bookingData = { customerName, eventCode, numberOfTickets, ticketPrice };

        if (type === 'ONLINE') {
            bookingData.type = 'ONLINE';
            bookingData.paymentGateway = document.getElementById('paymentGateway').value;
            bookingData.convenienceFee = parseFloat(document.getElementById('convenienceFee').value) || 0;
        } else {
            bookingData.type = 'COUNTER';
            bookingData.counterNumber = parseInt(document.getElementById('counterNumber').value) || null;
            bookingData.handlingAgent = document.getElementById('handlingAgent').value.trim();
        }

        try {
            await createBooking(bookingData);
            showToast('Booking created successfully!', 'success');
            setTimeout(() => navigateTo('booking-dashboard.html'), 1500);
        } catch (err) {
            showToast(err.message || 'Failed to create booking.', 'error');
        }
    }
</script>
</body>
</html>
