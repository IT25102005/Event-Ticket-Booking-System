<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Venue — Event Ticket Booking System</title>
  <link rel="stylesheet" href="css/venue-seat-management.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2>🎟️ EventBook</h2><p>Venue &amp; Seat Manager</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Navigation</div>
      <a class="nav-item" href="venue-dashboard.html"><span class="icon">🏠</span>Dashboard</a>
      <a class="nav-item" href="add-venue.html"><span class="icon">➕</span>Add Venue</a>
      <a class="nav-item" href="add-seat.html"><span class="icon">🪑</span>Add Seat</a>
      <a class="nav-item" href="add-seat-block.html"><span class="icon">🗂️</span>Add Seat Block</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="breadcrumb"><a href="venue-dashboard.html">Dashboard</a> › <span id="breadcrumb-name">Edit Venue</span></div>
      <h1>Edit Venue</h1>
      <p id="subtitle">Loading venue data...</p>
    </div>

    <div id="form-container">
      <div class="loading-overlay"><div class="loading-spinner" style="width:32px;height:32px;border-width:3px"></div><p>Loading venue details...</p></div>
    </div>
  </main>
</div>

<script src="js/venue-seat-management.js"></script>
<script>
  const venueId = getParam('id');
  if (!venueId) { showToast('No venue ID provided', 'error'); setTimeout(() => window.location.href='venue-dashboard.html', 1500); }

  let currentVenueType = '';

  async function loadVenueData() {
    try {
      const v = await apiGetVenue(venueId);
      currentVenueType = v.venueType;
      document.getElementById('breadcrumb-name').textContent = v.venueName;
      document.getElementById('subtitle').textContent = `Editing: ${v.venueName}`;
      renderForm(v);
    } catch (e) {
      document.getElementById('form-container').innerHTML =
        `<div class="empty-state"><div class="empty-icon">❌</div><h3>Venue not found</h3></div>`;
    }
  }

  function renderForm(v) {
    document.getElementById('form-container').innerHTML = `
      <form id="edit-venue-form" novalidate>
        <div class="card">
          <div class="card-header"><span class="card-title">📋 Basic Information</span></div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="venueName">Venue Name <span class="required">*</span></label>
              <input type="text" id="venueName" value="${v.venueName || ''}"/>
              <div class="form-error" id="venueName-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="venueType">Venue Type</label>
              <input type="text" id="venueType" value="${v.venueType || ''}" disabled style="opacity:0.5;cursor:not-allowed"/>
              <div class="form-hint">Venue type cannot be changed after creation</div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="location">Location <span class="required">*</span></label>
              <input type="text" id="location" value="${v.location || ''}"/>
              <div class="form-error" id="location-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="city">City <span class="required">*</span></label>
              <input type="text" id="city" value="${v.city || ''}"/>
              <div class="form-error" id="city-error"></div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <input type="text" id="address" value="${v.address || ''}"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="capacity">Capacity <span class="required">*</span></label>
              <input type="number" id="capacity" value="${v.capacity || 1}" min="1"/>
              <div class="form-error" id="capacity-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="status">Status</label>
              <select id="status">
                <option value="ACTIVE" ${v.status==='ACTIVE'?'selected':''}>✅ Active</option>
                <option value="INACTIVE" ${v.status==='INACTIVE'?'selected':''}>⛔ Inactive</option>
                <option value="MAINTENANCE" ${v.status==='MAINTENANCE'?'selected':''}>🔧 Maintenance</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description">${v.description || ''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="facilities">Facilities</label>
            <textarea id="facilities" style="min-height:60px">${v.facilities || ''}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="imageUrl">Image URL</label>
            <input type="url" id="imageUrl" value="${v.imageUrl || ''}"/>
          </div>
        </div>

        ${v.venueType === 'INDOOR' ? `
        <div class="card">
          <div class="card-header"><span class="card-title">🏛️ Indoor Venue Details</span></div>
          <div class="form-row-3">
            <div class="form-group">
              <label class="form-label" for="numberOfHalls">Number of Halls</label>
              <input type="number" id="numberOfHalls" value="${v.numberOfHalls || 1}" min="1"/>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:4px">
              <div class="checkbox-group">
                <input type="checkbox" id="airConditioned" ${v.airConditioned?'checked':''}/>
                <label for="airConditioned">Air Conditioned</label>
              </div>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:4px">
              <div class="checkbox-group">
                <input type="checkbox" id="hasSoundSystem" ${v.hasSoundSystem?'checked':''}/>
                <label for="hasSoundSystem">Sound System</label>
              </div>
            </div>
          </div>
        </div>` : ''}

        ${v.venueType === 'OUTDOOR' ? `
        <div class="card">
          <div class="card-header"><span class="card-title">🌿 Outdoor Venue Details</span></div>
          <div class="form-row-3">
            <div class="form-group">
              <label class="form-label" for="openGroundArea">Ground Area (sqm)</label>
              <input type="number" id="openGroundArea" value="${v.openGroundArea || 0}" min="0" step="0.1"/>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:4px">
              <div class="checkbox-group">
                <input type="checkbox" id="weatherProtected" ${v.weatherProtected?'checked':''}/>
                <label for="weatherProtected">Weather Protected</label>
              </div>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:4px">
              <div class="checkbox-group">
                <input type="checkbox" id="hasParkingArea" ${v.hasParkingArea?'checked':''}/>
                <label for="hasParkingArea">Parking Area</label>
              </div>
            </div>
          </div>
        </div>` : ''}

        <div style="display:flex;gap:12px;margin-bottom:40px">
          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">💾 Save Changes</button>
          <a href="venue-details.html?id=${v.venueId}" class="btn btn-ghost btn-lg">← Cancel</a>
        </div>
      </form>`;

    document.getElementById('edit-venue-form').addEventListener('submit', handleSubmit);
  }

  async function handleSubmit(e) {
    e.preventDefault();
    clearAllErrors('edit-venue-form');

    // Validation
    let valid = true;
    if (!document.getElementById('venueName').value.trim()) { showFieldError('venueName','Required'); valid=false; }
    if (!document.getElementById('location').value.trim()) { showFieldError('location','Required'); valid=false; }
    if (!document.getElementById('city').value.trim()) { showFieldError('city','Required'); valid=false; }
    const cap = parseInt(document.getElementById('capacity').value);
    if (!cap || cap < 1) { showFieldError('capacity','Must be at least 1'); valid=false; }
    if (!valid) return;

    const payload = {
      venueName:   document.getElementById('venueName').value.trim(),
      venueType:   currentVenueType,
      location:    document.getElementById('location').value.trim(),
      address:     document.getElementById('address').value.trim(),
      city:        document.getElementById('city').value.trim(),
      capacity:    cap,
      description: document.getElementById('description').value.trim(),
      facilities:  document.getElementById('facilities').value.trim(),
      imageUrl:    document.getElementById('imageUrl').value.trim(),
      status:      document.getElementById('status').value,
    };

    if (currentVenueType === 'INDOOR') {
      payload.numberOfHalls  = parseInt(document.getElementById('numberOfHalls').value) || 1;
      payload.airConditioned = document.getElementById('airConditioned').checked;
      payload.hasSoundSystem = document.getElementById('hasSoundSystem').checked;
    } else if (currentVenueType === 'OUTDOOR') {
      payload.openGroundArea   = parseFloat(document.getElementById('openGroundArea').value) || 0;
      payload.weatherProtected = document.getElementById('weatherProtected').checked;
      payload.hasParkingArea   = document.getElementById('hasParkingArea').checked;
    }

    const btn = document.getElementById('submit-btn');
    const orig = btn.innerHTML;
    setButtonLoading(btn, true, orig);
    try {
      await apiUpdateVenue(venueId, payload);
      showToast('Venue updated successfully! ✅', 'success');
      setTimeout(() => window.location.href = `venue-details.html?id=${venueId}`, 1500);
    } catch (err) {
      getFormErrors(err);
    } finally {
      setButtonLoading(btn, false, orig);
    }
  }

  loadVenueData();
</script>
</body>
</html>
